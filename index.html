<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2 - Face Tracking POC</title>
    <!-- Load face-api.js from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #000;
    }
    video {
        display: none;
    }
    .container {
      position: relative;
      height: 100%;
      width: 100%;
    }
    .svg-layer {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      /* optional: control size */
      max-width: 100%;
      max-height: 100%;
    }
    .midground{
      width:calc(99vh*1.7);
      height:99vh;
      max-width:99vw;
      z-index:0;
      background-color: #fff;
    }
    .mask-layer {
      width:auto;
      height:100vh;
      max-width:100vw;
      z-index: 2;
    }
  .pupil-layer {
      height: 80vh;
      width: auto;
      z-index: 1;
      left: 50%;
      top: 50%; 
      /* Use CSS transform to do transformations on the GPU */
      transform: translate(calc(-50% + var(--move-x, 0vw)), calc(-50% + var(--move-y, 0vh)));
      transition: transform 0.15s ease-out; 
  }
    .mouth-layer{
      height:20vh;
      width:auto;
      max-width:100vw;
      z-index: 3;
      top: 80%;
    }
  </style>
</head>
<body>

  <div id="container" class="container">
    <div class="svg-layer midground"></div>
    <img id = "pupils" class="svg-layer pupil-layer" src="PupilL.svg" alt="SVG 2" />
    <img class="svg-layer mask-layer" src="Mask.svg" alt="SVG 3" />
    <img class="svg-layer mouth-layer" src="Mouth.svg" alt="SVG 1" />
  </div>
    <!-- Hidden video element to capture webcam stream -->
    <video id="webcam" autoplay muted playsinline></video>

    <script>
        const svgElement = document.querySelector('.pupil-layer');
        const video = document.getElementById('webcam');

        const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights';

        async function init() {
            try {
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                
                startVideo();
            } catch (error) {
                  1+1;
            }
        }

        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: { width: { ideal: 640 }, height: { ideal: 480 } } , audio: false })
                .then(stream => {
                    video.srcObject = stream;
                })
                .catch(err => {
                    1+1;
                });
        }
        const detectorOptions = new faceapi.TinyFaceDetectorOptions();
        video.addEventListener('play', () => {
            
            // Set up a loop to detect faces roughly 10 times a second
             async function trackFace() {
                // Detect all faces in the current video frame
                const detections = await faceapi.detectAllFaces(video, detectorOptions);

                if (detections.length > 0) {
                    // 1. Find the largest face by comparing bounding box areas
                    let largestFace = detections[0];
                    let maxArea = largestFace.box.width * largestFace.box.height;

                    for (let i = 1; i < detections.length; i++) {
                        const area = detections[i].box.width * detections[i].box.height;
                        if (area > maxArea) {
                            maxArea = area;
                            largestFace = detections[i];
                        }
                    }

                    const box = largestFace.box;
                    const centerX = box.x + (box.width / 2);
                    const centerY = box.y + (box.height / 2);

                    const percentX = Math.abs(100 - (centerX / video.videoWidth) * 100);
                    const percentY = Math.abs(100 - (centerY / video.videoHeight) * 100);
                    //Fancy transform logic
                    const shiftX = (percentX - 50) / 5;
                    const shiftY = -(percentY - 50) / 2; 

                    svgElement.style.setProperty('--move-x', `${shiftX}vw`);
                    svgElement.style.setProperty('--move-y', `${shiftY}vh`);
                    //Pupil switching logic. Don't like it, but here just in case.
                    /*
                    if (percentX < 50){
                      svgElement.src = "PupilL.svg";
                    } else {
                      svgElement.src = "PupilR.svg";
                    }
                    */
                } 
                trackFace();
                //OooOooh recursion!
            }
            trackFace();
        });

        init();
    </script>
  <script>
  /*Code modified from the w3schools example implementation*/
  var elem = document.getElementById("container");

  /* When the openFullscreen() function is executed, open the video in fullscreen.
  Note that we must include prefixes for different browsers, as they don't support the requestFullscreen method yet */
  function openFullscreen() {
    //Isn't it lovely that every browser has to have a different fullscreen method?
    if (elem.requestFullscreen) {
      elem.requestFullscreen();
    } else if (elem.webkitRequestFullscreen) { /* Safari */
      elem.webkitRequestFullscreen();
    } else if (elem.msRequestFullscreen) { /* IE11 */
      elem.msRequestFullscreen();
    } else if (elem.mozRequestFullScreen) {
      elem.mozRequestFullscreen();
    }
  }
  document.addEventListener('click', function(event) {
    openFullscreen();
  });
  </script>
</body>
</html>
